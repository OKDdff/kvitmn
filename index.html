<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Monobank Receipt Editor</title>
    
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        @font-face { font-family: 'Manrope'; src: url('Manrope.ttf'); }

        body, html {
            margin: 0; padding: 0; 
            width: 100%; height: 100%;
            background-color: #1a1a1a; /* Темний фон як на скріншоті */
            font-family: 'Manrope', sans-serif;
            display: flex;
            flex-direction: column;
            color: white;
            overflow: hidden;
        }

        /* Верхня панель (Header) */
        .header {
            display: flex;
            align-items: center;
            padding: 45px 16px 15px;
            background-color: #1a1a1a;
        }
        .header .back-icon { font-size: 24px; cursor: pointer; width: 30px; }
        .header .title { flex: 1; text-align: center; font-size: 18px; font-weight: 500; margin-right: 30px; }

        /* Основна область з квитанцією */
        #main-view {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-y: auto;
            padding: 10px;
        }

        #receipt-wrapper {
            width: 100%;
            max-width: 360px;
            background-color: #fff;
            position: relative;
        }

        .receipt-container {
            width: 100%;
            position: relative;
            background-size: 100% 100%;
        }

        .editable {
            position: absolute;
            background: transparent; 
            outline: none;
            font-weight: 600; 
            color: #1a1a1c;
            z-index: 10;
            font-size: calc(var(--size) * 0.96vw);
        }

        @media (min-width: 600px) {
            .editable { font-size: calc(var(--size) * 3.84px); }
        }

        .grow-left { transform: translateX(-100%); text-align: right; }

        /* Нижня панель з кнопкою */
        .bottom-bar {
            padding: 20px 16px 40px;
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
        }

        #share-btn {
            width: 100%;
            max-width: 380px;
            background-color: #ff5252; /* Колір кнопки зі скріншота */
            color: white;
            border: none;
            padding: 18px;
            border-radius: 14px;
            font-size: 17px;
            font-weight: 500;
            cursor: pointer;
        }

        #share-btn:active { opacity: 0.8; }
    </style>
</head>
<body>

    <div class="header">
        <div class="back-icon">←</div>
        <div class="title">Квитанція</div>
    </div>

    <div id="main-view">
        <div id="receipt-wrapper">
            <div id="receipt" class="receipt-container" spellcheck="false"></div>
        </div>
    </div>

    <div class="bottom-bar">
        <button id="share-btn">Поділитися квитанцією</button>
    </div>

    <script>
        const container = document.getElementById('receipt');
        const shareBtn = document.getElementById('share-btn');
        const { jsPDF } = window.jspdf;

        const fieldsConfig = [
            { id: 'm1', t: '04B3-T314-B969-2M3C', left: 50.91, top: 23.4, s: 2.6, growLeft: true },
            { id: 'm2', t: '14.04.2026', left: 58.11, top: 23.4, s: 2.6 },
            { id: 'm3', t: 'Яцюк Роман Миколайович', left: 47.73, top: 27.2, s: 2.4 },
            { id: 'm4', t: 'Універсал Банк', left: 47.73, top: 29.1, s: 2.4 },
            { id: 'm9', t: 'ПриватБанк', left: 47.73, top: 40.2, s: 2.4 },
            { id: 'm12', t: '200.00', left: 47.73, top: 47.37, s: 2.5 },
            { id: 'm14', t: 'двісті гривень 00 копійок', left: 47.73, top: 50.31, s: 2.3 }
        ];

        function init() {
            const img = new Image();
            img.src = 'IMG_3372.PNG'; 
            img.onload = function() {
                container.style.height = (container.offsetWidth * (img.height / img.width)) + 'px';
                container.style.backgroundImage = "url('IMG_3372.PNG')";
                renderFields();
            };
        }

        function renderFields() {
            fieldsConfig.forEach(conf => {
                const el = document.createElement('div');
                el.className = 'editable' + (conf.growLeft ? ' grow-left' : '');
                el.contentEditable = "true";
                el.style.top = conf.top + '%';
                el.style.left = conf.left + '%';
                el.style.setProperty('--size', conf.s);
                el.innerText = conf.t;
                container.appendChild(el);
            });
        }

        function generateRandomName() {
            const chars = '0123456789ABCDEF';
            const part = (len) => Array.from({length: len}, () => chars[Math.floor(Math.random() * 16)]).join('');
            return `${part(8)}-${part(4)}-${part(4)}-${part(4)}-${part(12)}.pdf`;
        }

        shareBtn.onclick = function() {
            html2canvas(document.getElementById('receipt-wrapper'), {
                scale: 4,
                useCORS: true
            }).then(canvas => {
                const imgData = canvas.toDataURL('image/png');
                const pdf = new jsPDF({
                    orientation: 'portrait',
                    unit: 'px',
                    format: [canvas.width / 4, canvas.height / 4]
                });
                pdf.addImage(imgData, 'PNG', 0, 0, canvas.width / 4, canvas.height / 4);
                pdf.save(generateRandomName());
            });
        };

        window.onload = init;
    </script>
</body>
</html>
