<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Monobank Receipt Editor</title>
    
    <style>
        @font-face { font-family: 'Manrope'; src: url('Manrope.ttf'); }

        body, html {
            margin: 0; padding: 0; 
            width: 100%; height: 100%;
            background-color: #1a1a1a; /* Темний фон як у додатку */
            font-family: 'Manrope', sans-serif;
            display: flex;
            flex-direction: column;
            color: white;
            overflow: hidden;
        }

        /* Заголовок як на скріншоті */
        .header {
            display: flex;
            align-items: center;
            padding: 45px 16px 15px;
            background-color: #1a1a1a;
        }
        .header .back-icon { font-size: 24px; width: 30px; cursor: default; }
        .header .title { flex: 1; text-align: center; font-size: 18px; font-weight: 500; margin-right: 30px; }

        /* Область редагування */
        #main-view {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-y: auto;
            padding: 10px;
        }

        #receipt-wrapper {
            width: 100%;
            max-width: 360px;
            background-color: #fff;
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .receipt-container {
            width: 100%;
            position: relative;
            background-size: 100% 100%;
            background-repeat: no-repeat;
        }

        /* Стилі для полів, що редагуються */
        .editable {
            position: absolute;
            background: transparent; 
            outline: none;
            font-weight: 600; 
            color: #1a1a1c;
            z-index: 10;
            white-space: nowrap;
            border: 1px solid transparent;
        }

        /* Підсвітка при фокусі для зручності */
        .editable:focus {
            border-bottom: 1px dashed #ff5252;
        }

        .editable { font-size: calc(var(--size) * 0.96vw); }

        @media (min-width: 600px) {
            #receipt-wrapper { max-width: 500px; }
            .editable { font-size: calc(var(--size) * 4.8px); }
        }

        .grow-left { transform: translateX(-100%); text-align: right; }
    </style>
</head>
<body>

    <div class="header">
        <div class="back-icon">←</div>
        <div class="title">Квитанція</div>
    </div>

    <div id="main-view">
        <div id="receipt-wrapper">
            <div id="receipt" class="receipt-container" spellcheck="false"></div>
        </div>
    </div>

    <script>
        const container = document.getElementById('receipt');

        // Повний набір з 18 рядків для редагування
        const fieldsConfig = [
            { id: 'm1', t: '99A1-K442-L088-5Z3C', left: 50.91, top: 25.79, s: 2.6, growLeft: true },
            { id: 'm2', t: '18.04.2026', left: 58.11, top: 25.79, s: 2.6 },
            { id: 'm3', t: 'Мельник Артем Вікторович', left: 47.73, top: 27.86, s: 2.4 },
            { id: 'm4', t: 'Універсал Банк', left: 47.73, top: 29.33, s: 2.4 },
            { id: 'm5', t: '322001', left: 47.73, top: 30.81, s: 2.4 },
            { id: 'm6', t: 'Mastercard', left: 47.73, top: 32.29, s: 2.4 },
            { id: 'm7', t: 'UA4432200100000262000112233445', left: 47.73, top: 33.85, s: 2.1 },
            { id: 'm8', t: '516875******4490', left: 47.73, top: 35.21, s: 2.4 },
            { id: 'm9', t: 'ПриватБанк', left: 47.73, top: 39.95, s: 2.4 },
            { id: 'm10', t: 'VISA', left: 47.73, top: 41.45, s: 2.4 },
            { id: 'm11', t: '4149499988887777', left: 47.73, top: 42.92, s: 2.4 },
            { id: 'm12', t: '3,200.00', left: 47.73, top: 47.37, s: 2.5 },
            { id: 'm13', t: '0.00', left: 47.73, top: 48.84, s: 2.5 },
            { id: 'm14', t: 'три тисячі двісті гривень 00 копійок', left: 47.73, top: 50.31, s: 2.3 },
            { id: 'm15', t: '771209', left: 47.73, top: 51.78, s: 2.4 },
            { id: 'm16', t: 'Оплата послуг', left: 47.73, top: 53.25, s: 2.4 },
            { id: 'm17', t: '18.04.2026 09:15', left: 47.73, top: 54.72, s: 2.4 },
            { id: 'm18', t: 'MONO-API-GATE', left: 47.73, top: 56.19, s: 2.4 }
        ];

        function init() {
            const img = new Image();
            img.src = 'IMG_3372.PNG'; 
            img.onload = function() {
                container.style.height = (container.offsetWidth * (img.height / img.width)) + 'px';
                container.style.backgroundImage = "url('IMG_3372.PNG')";
                renderFields();
            };
        }

        function renderFields() {
            fieldsConfig.forEach(conf => {
                const el = document.createElement('div');
                el.className = 'editable' + (conf.growLeft ? ' grow-left' : '');
                el.contentEditable = "true";
                el.style.top = conf.top + '%';
                el.style.left = conf.left + '%';
                el.style.setProperty('--size', conf.s);
                el.innerText = conf.t;
                container.appendChild(el);
            });
        }

        window.onload = init;
    </script>
</body>
</html>
