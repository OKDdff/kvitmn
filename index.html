<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Monobank Editor Pro</title>
    <style>
        @font-face { font-family: 'Manrope'; src: url('Manrope.ttf'); }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000;
            font-family: 'Manrope', sans-serif;
            display: flex; flex-direction: column; align-items: center;
        }

        #dev-tools {
            width: 100%; max-width: 500px;
            background: #222; color: #fff;
            padding: 10px; font-size: 11px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 100; position: sticky; top: 0;
        }

        #wrapper {
            width: 100%; max-width: 500px;
            background-color: #fff;
            position: relative;
        }

        .receipt-container {
            position: relative;
            width: 100%;
            background-size: 100% 100%;
            background-repeat: no-repeat;
        }

        .editable {
            position: absolute;
            background: transparent; 
            outline: none;
            white-space: nowrap;
            font-weight: 600; 
            letter-spacing: -0.01em;
            color: #1a1a1c;
            -webkit-font-smoothing: antialiased;
            z-index: 5;
            min-width: 10px;
        }

        /* Ще менший шрифт за замовчуванням */
        .editable { font-size: calc(var(--size) * 0.9vw); }
        @media (min-width: 500px) {
            .editable { font-size: calc(var(--size) * 4.5px); }
        }

        /* Режим розробника */
        .dev-mode .editable {
            background: rgba(255, 0, 0, 0.1);
            border: 1px dashed red;
            cursor: move;
        }

        .grow-left { transform: translateX(-100%); text-align: right; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="dev-tools">
        <label>🛠 Режим розробника: <input type="checkbox" id="dev-toggle"></label>
        <span id="coords-display">L: 0% T: 0%</span>
    </div>

    <div id="wrapper">
        <div id="receipt" class="receipt-container" spellcheck="false"></div>
    </div>

    <script>
        const container = document.getElementById('receipt');
        const devToggle = document.getElementById('dev-toggle');
        const coordsDisplay = document.getElementById('coords-display');

        // Повний список рядків назад
        const fieldsConfig = [
            { id: 'm1', t: '04B3-T314-B969-2M3C', left: 49.3, top: 23.4, s: 2.6, growLeft: true },
            { id: 'm2', t: '14.04.2026', left: 58.5, top: 23.4, s: 2.6 },
            { id: 'm3', t: 'Ящук Роман Миколайович', left: 47.4, top: 27.5, s: 2.4 },
            { id: 'm4', t: 'Універсал Банк', left: 47.4, top: 29.3, s: 2.4 },
            { id: 'm5', t: '322001', left: 47.4, top: 31.05, s: 2.4 },
            { id: 'm6', t: 'VISA', left: 47.4, top: 32.8, s: 2.4 },
            { id: 'm7', t: 'UA6232200100000262000332156538', left: 47.4, top: 34.45, s: 2.1 },
            { id: 'm8', t: '444111******1335', left: 47.4, top: 36.3, s: 2.4 },
            { id: 'm9', t: 'ПриватБанк', left: 47.4, top: 40.8, s: 2.4 },
            { id: 'm10', t: 'VISA', left: 47.4, top: 42.6, s: 2.4 },
            { id: 'm11', t: '4149499075804946', left: 47.4, top: 44.4, s: 2.4 },
            { id: 'm12', t: '200.00', left: 47.4, top: 49.3, s: 2.5 },
            { id: 'm13', t: '0.00', left: 47.4, top: 51.1, s: 2.5 },
            { id: 'm14', t: 'двісті гривень 00 копійок', left: 47.4, top: 52.85, s: 2.4 },
            { id: 'm15', t: '490404', left: 47.4, top: 54.6, s: 2.4 },
            { id: 'm16', t: 'Переказ особистих коштів', left: 47.4, top: 56.4, s: 2.4 },
            { id: 'm17', t: '14.04.2026 12:57', left: 47.4, top: 58.1, s: 2.4 },
            { id: 'm18', t: 'MONODirectR', left: 47.4, top: 59.9, s: 2.4 }
        ];

        function init() {
            const img = new Image();
            img.src = 'IMG_3372.PNG'; 
            img.onload = function() {
                container.style.height = (container.offsetWidth * (img.height / img.width)) + 'px';
                container.style.backgroundImage = "url('IMG_3372.PNG')";
                renderFields();
            };
        }

        function renderFields() {
            fieldsConfig.forEach(conf => {
                const el = document.createElement('div');
                el.id = conf.id;
                el.className = 'editable' + (conf.growLeft ? ' grow-left' : '');
                el.contentEditable = "true";
                el.style.top = conf.top + '%';
                el.style.left = conf.left + '%';
                el.style.setProperty('--size', conf.s);
                el.innerText = conf.t;
                makeDraggable(el);
                container.appendChild(el);
            });
        }

        function makeDraggable(el) {
            let isDragging = false;
            let startX, startY, startLeft, startTop;

            const start = (e) => {
                if (!devToggle.checked) return;
                isDragging = true;
                const touch = e.type === 'touchstart' ? e.touches[0] : e;
                startX = touch.clientX;
                startY = touch.clientY;
                startLeft = parseFloat(el.style.left);
                startTop = parseFloat(el.style.top);
                el.style.zIndex = 1000;
            };

            const move = (e) => {
                if (!isDragging) return;
                const touch = e.type === 'touchmove' ? e.touches[0] : e;
                const rect = container.getBoundingClientRect();
                
                const deltaX = ((touch.clientX - startX) / rect.width) * 100;
                const deltaY = ((touch.clientY - startY) / rect.height) * 100;

                const finalLeft = (startLeft + deltaX).toFixed(2);
                const finalTop = (startTop + deltaY).toFixed(2);

                el.style.left = finalLeft + '%';
                el.style.top = finalTop + '%';
                coordsDisplay.innerText = `L: ${finalLeft}% T: ${finalTop}%`;
            };

            const end = () => {
                isDragging = false;
                el.style.zIndex = 5;
            };

            el.addEventListener('mousedown', start);
            el.addEventListener('touchstart', start, { passive: false });
            window.addEventListener('mousemove', move);
            window.addEventListener('touchmove', move, { passive: false });
            window.addEventListener('mouseup', end);
            window.addEventListener('touchend', end);
        }

        devToggle.onchange = () => {
            document.body.classList.toggle('dev-mode', devToggle.checked);
        };

        window.onload = init;
    </script>
</body>
</html>
