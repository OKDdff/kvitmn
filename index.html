<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Monobank Editor Pro</title>
    <style>
        @font-face { font-family: 'Manrope'; src: url('Manrope.ttf'); }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000;
            font-family: 'Manrope', sans-serif;
            display: flex; flex-direction: column; align-items: center;
        }

        #dev-tools {
            width: 100%; max-width: 500px;
            background: #222; color: #fff;
            padding: 10px; font-size: 12px;
            display: flex; justify-content: space-between;
            z-index: 100;
        }

        #wrapper {
            width: 100%; max-width: 500px;
            background-color: #fff;
            position: relative;
            overflow-y: auto;
        }

        .receipt-container {
            position: relative;
            width: 100%;
            background-size: 100% 100%;
            background-repeat: no-repeat;
        }

        .editable {
            position: absolute;
            background: transparent; 
            outline: none;
            white-space: nowrap;
            font-weight: 600; 
            letter-spacing: -0.01em;
            color: #1a1a1c;
            -webkit-font-smoothing: antialiased;
            cursor: move; /* Вказуємо, що можна рухати */
        }

        /* Зменшений шрифт */
        .editable { font-size: calc(var(--size) * 0.95vw); }
        @media (min-width: 500px) {
            .editable { font-size: calc(var(--size) * 4.75px); }
        }

        /* Стиль для режиму розробника */
        .dev-mode .editable {
            background: rgba(255, 0, 0, 0.1);
            border: 1px dashed red;
        }

        .grow-left { transform: translateX(-100%); text-align: right; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="dev-tools">
        <span>Режим розробника: <input type="checkbox" id="dev-toggle"></span>
        <span id="coords-display">Координати з'являться тут</span>
    </div>

    <div id="wrapper">
        <div id="receipt" class="receipt-container" spellcheck="false"></div>
    </div>

    <script>
        const container = document.getElementById('receipt');
        const devToggle = document.getElementById('dev-toggle');
        const coordsDisplay = document.getElementById('coords-display');

        const fieldsConfig = [
            { id: 'm1', t: '04B3-T314-B969-2M3C', left: 49.3, top: 23.4, s: 2.6, growLeft: true },
            { id: 'm2', t: '14.04.2026', left: 58.5, top: 23.4, s: 2.6 },
            { id: 'm3', t: 'Ящук Роман Миколайович', left: 47.4, top: 27.5, s: 2.5 },
            { id: 'm4', t: 'Універсал Банк', left: 47.4, top: 29.3, s: 2.5 },
            { id: 'm12', t: '200.00', left: 47.4, top: 49.3, s: 2.6 },
            { id: 'm14', t: 'двісті гривень 00 копійок', left: 47.4, top: 52.85, s: 2.5 }
            // Додай інші поля за потреби
        ];

        function init() {
            const img = new Image();
            img.src = 'IMG_3372.PNG'; 
            img.onload = function() {
                container.style.height = (container.offsetWidth * (img.height / img.width)) + 'px';
                container.style.backgroundImage = "url('IMG_3372.PNG')";
                renderFields();
            };
        }

        function renderFields() {
            fieldsConfig.forEach(conf => {
                const el = document.createElement('div');
                el.id = conf.id;
                el.className = 'editable' + (conf.growLeft ? ' grow-left' : '');
                el.contentEditable = "true";
                el.style.top = conf.top + '%';
                el.style.left = conf.left + '%';
                el.style.setProperty('--size', conf.s);
                el.innerText = conf.t;

                // Логіка перетягування
                makeDraggable(el);
                
                container.appendChild(el);
            });
        }

        function makeDraggable(el) {
            let isDragging = false;
            el.addEventListener('mousedown', startDrag);
            el.addEventListener('touchstart', startDrag, {passive: false});

            function startDrag(e) {
                if (!devToggle.checked) return;
                isDragging = true;
                e.preventDefault();
            }

            window.addEventListener('mousemove', drag);
            window.addEventListener('touchmove', drag, {passive: false});

            function drag(e) {
                if (!isDragging) return;
                let x = e.touches ? e.touches[0].clientX : e.clientX;
                let y = e.touches ? e.touches[0].clientY : e.clientY;

                let rect = container.getBoundingClientRect();
                let newLeft = ((x - rect.left) / rect.width) * 100;
                let newTop = ((y - rect.top) / rect.height) * 100;

                el.style.left = newLeft.toFixed(2) + '%';
                el.style.top = newTop.toFixed(2) + '%';
                
                coordsDisplay.innerText = `L: ${newLeft.toFixed(1)}% T: ${newTop.toFixed(1)}%`;
            }

            window.addEventListener('mouseup', () => isDragging = false);
            window.addEventListener('touchend', () => isDragging = false);
        }

        devToggle.onchange = () => {
            document.body.classList.toggle('dev-mode', devToggle.checked);
        };

        window.onload = init;
    </script>
</body>
</html>
