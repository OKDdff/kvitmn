<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Monobank Editor Fix</title>
    <style>
        @font-face { font-family: 'Manrope'; src: url('Manrope.ttf'); }
        body, html { margin: 0; padding: 0; background-color: #000; font-family: 'Manrope', sans-serif; }
        
        #wrapper {
            width: 100vw; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            background-color: #1a1a1a; overflow-y: auto;
        }

        /* Контейнер чека */
        .receipt-container {
            position: relative;
            width: 100%;
            max-width: 500px; /* Обмежуємо ширину для зручності */
            background-color: #fff; /* Білий фон, якщо картинка не завантажиться */
            background-size: 100% 100%;
            background-repeat: no-repeat;
            min-height: 200px;
            border: 1px solid red; /* ТИМЧАСОВО: щоб бачити межі */
        }

        .editable {
            position: absolute;
            background: rgba(255, 255, 255, 0.5); /* Легкий фон, щоб бачити де поле */
            outline: none;
            white-space: nowrap;
            font-weight: 600;
            color: #1a1a1c;
            min-width: 40px;
            min-height: 1.2em;
            z-index: 10;
        }

        .grow-left { transform: translateX(-100%); text-align: right; }
        #error-log { color: red; background: white; font-size: 12px; width: 100%; }
    </style>
</head>
<body>

    <div id="error-log"></div>
    <div id="wrapper">
        <div id="receipt" class="receipt-container" spellcheck="false"></div>
    </div>

    <script>
        const log = document.getElementById('error-log');
        const container = document.getElementById('receipt');
        let userID = localStorage.getItem('mono_v2_user') || 'user1';

        const fieldsConfig = [
            { id: 'm1', t: '04B3-T314-B969-2M3C', left: 49.5, top: 23.5, s: 2.8, growLeft: true },
            { id: 'm3', t: 'Ящук Роман Миколайович', left: 47.2, top: 27.5, s: 2.7 },
            { id: 'm12', t: '200.00', left: 47.2, top: 49.3, s: 2.7 },
            { id: 'm14', t: 'двісті гривень 00 копійок', left: 47.2, top: 52.8, s: 2.7 }
        ];

        function init() {
            const img = new Image();
            // ПЕРЕВІР НАЗВУ! Можливо великі літери .PNG або .JPG?
            img.src = 'IMG_3372.png'; 
            
            img.onload = function() {
                container.style.height = (container.offsetWidth * (img.height / img.width)) + 'px';
                container.style.backgroundImage = "url('" + img.src + "')";
                renderFields();
            };

            img.onerror = function() {
                log.innerHTML += "Помилка: Не знайдено IMG_3372.png. Пробую .jpg...<br>";
                const imgJpg = new Image();
                imgJpg.src = 'IMG_3372.jpg';
                imgJpg.onload = function() {
                    container.style.height = (container.offsetWidth * (imgJpg.height / imgJpg.width)) + 'px';
                    container.style.backgroundImage = "url('IMG_3372.jpg')";
                    renderFields();
                };
                imgJpg.onerror = function() {
                    log.innerHTML += "Критична помилка: Картинку не знайдено взагалі. Перевір назву файлу в папці!";
                    // Малюємо поля навіть без картинки
                    container.style.height = "800px";
                    renderFields();
                };
            };
        }

        function renderFields() {
            container.innerHTML = ''; // Очистити перед рендером
            fieldsConfig.forEach(conf => {
                const el = document.createElement('div');
                el.id = conf.id;
                el.className = 'editable' + (conf.growLeft ? ' grow-left' : '');
                el.contentEditable = "true";
                el.style.top = conf.top + '%';
                el.style.left = conf.left + '%';
                el.style.fontSize = (conf.s * 1.2) + 'vw'; // Трохи збільшив для видимості
                el.innerText = conf.t;
                container.appendChild(el);
            });
        }

        window.onload = init;
    </script>
</body>
</html>
