<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="monobank">
    
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" type="image/png" href="icon.png">
    
    <title>Monobank Receipt Editor</title>
    
    <style>
        @font-face { 
            font-family: 'Manrope'; 
            src: url('Manrope.ttf'); 
            font-weight: 600;
        }

        * { box-sizing: border-box; }

        body, html {
            margin: 0; padding: 0; 
            width: 100%; min-height: 100%;
            background-color: #f5f5f7;
            font-family: 'Manrope', sans-serif;
            display: flex;
            justify-content: center;
            -webkit-user-select: none;
        }

        #receipt-wrapper {
            width: 100%;
            max-width: 500px;
            background-color: #fff;
            position: relative;
            align-self: flex-start;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .receipt-container {
            width: 100%;
            position: relative;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: top center;
        }

        .editable {
            position: absolute;
            background: transparent; 
            outline: none;
            white-space: nowrap;
            font-weight: 600; 
            letter-spacing: -0.01em;
            color: #1a1a1c;
            -webkit-font-smoothing: antialiased;
            z-index: 10;
            -webkit-user-select: text;
            user-select: text;
            min-width: 2px;
            font-size: calc(var(--size) * 1vw);
        }

        @media (min-width: 500px) {
            .editable { font-size: calc(var(--size) * 5px); }
        }

        .grow-left { 
            transform: translateX(-100%); 
            text-align: right; 
        }

        .editable:focus {
            background: rgba(0, 0, 0, 0.03);
            border-radius: 2px;
        }
    </style>
</head>
<body>

    <div id="receipt-wrapper">
        <div id="receipt" class="receipt-container" spellcheck="false"></div>
    </div>

    <script>
        const container = document.getElementById('receipt');

        const fieldsConfig = [
            { id: 'm1', t: '99A1-K442-L088-5Z3C', left: 40.00, top: 25.79, s: 2.6 }, 
            { id: 'm2', t: '18.04.2026', left: 58.11, top: 25.79, s: 2.6 },
            { id: 'm3', t: 'Мельник Артем Вікторович', left: 47.73, top: 27.86, s: 2.4 },
            { id: 'm4', t: 'Універсал Банк', left: 47.73, top: 29.33, s: 2.4 },
            { id: 'm5', t: '322001', left: 47.73, top: 30.81, s: 2.4 },
            { id: 'm6', t: 'Mastercard', left: 47.73, top: 32.29, s: 2.4 },
            { id: 'm7', t: 'UA4432200100000262000112233445', left: 47.73, top: 33.85, s: 2.1 },
            { id: 'm8', t: '516875******4490', left: 47.73, top: 35.21, s: 2.4 },
            { id: 'm9', t: 'ПриватБанк', left: 47.73, top: 39.95, s: 2.4 },
            { id: 'm10', t: 'VISA', left: 47.73, top: 41.45, s: 2.4 },
            { id: 'm11', t: '4149499988887777', left: 47.73, top: 42.92, s: 2.4 },
            { id: 'm12', t: '3,200.00', left: 47.73, top: 47.37, s: 2.5 },
            { id: 'm13', t: '0.00', left: 47.73, top: 48.84, s: 2.5 },
            { id: 'm14', t: 'три тисячі двісті гривень 00 копійок', left: 47.73, top: 50.31, s: 2.3 },
            { id: 'm15', t: '771209', left: 47.73, top: 51.78, s: 2.4 },
            { id: 'm16', t: 'Оплата послуг', left: 47.73, top: 53.25, s: 2.4 },
            { id: 'm17', t: '18.04.2026 09:15', left: 47.73, top: 54.72, s: 2.4 },
            { id: 'm18', t: 'MONO-API-GATE', left: 47.73, top: 56.19, s: 2.4 }
        ];

        function init() {
            const img = new Image();
            img.src = 'IMG_3372.PNG'; 
            img.onload = function() {
                const ratio = img.height / img.width;
                container.style.paddingBottom = (ratio * 100) + '%';
                container.style.backgroundImage = `url('${img.src}')`;
                renderFields();
            };
        }

        function renderFields() {
            fieldsConfig.forEach(conf => {
                const el = document.createElement('div');
                el.id = conf.id;
                el.className = 'editable' + (conf.growLeft ? ' grow-left' : '');
                el.contentEditable = "true";
                el.style.top = conf.top + '%';
                el.style.left = conf.left + '%';
                el.style.setProperty('--size', conf.s);
                el.innerText = conf.t;

                el.addEventListener('focus', function() {
                    const range = document.createRange();
                    range.selectNodeContents(this);
                    const sel = window.getSelection();
                    sel.removeAllRanges();
                    sel.addRange(range);
                });

                el.addEventListener('blur', function() {
                    if (this.innerText.trim() === "") {
                        this.innerText = " "; 
                    }
                });

                container.appendChild(el);
            });
        }

        window.onload = init;
    </script>
</body>
</html>
